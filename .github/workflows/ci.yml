name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  evals:
    name: eval metrics unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - name: Run dependency-free metric tests
        run: python -m pytest evals/test_metrics.py -v

